apiVersion: apps/v1
kind: Deployment
metadata:
  name: feloxi-api
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feloxi-api
  template:
    metadata:
      labels:
        app: feloxi-api
    spec:
      containers:
        - name: feloxi-api
          image: ghcr.io/thesaadmirza/feloxi/api:v0.3.1   # Update tag on deploy
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # ── Database URLs (composed from secrets) ──
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: feloxi-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: feloxi-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: feloxi-secrets
                  key: postgres-db
            - name: DATABASE_URL
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@feloxi-postgres:5432/$(POSTGRES_DB)"
            - name: CLICKHOUSE_URL
              value: "http://feloxi-clickhouse:8123"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: feloxi-secrets
                  key: clickhouse-user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: feloxi-secrets
                  key: clickhouse-password
            - name: REDIS_URL
              value: "redis://feloxi-redis:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: feloxi-secrets
                  key: jwt-secret

            # ── Application config ──
            - name: PORT
              value: "8080"
            - name: CORS_ORIGIN
              value: "https://feloxi.example.com"        # Change to your domain
            - name: RUST_LOG
              value: "api=info,tower_http=warn"
            - name: DISABLE_SWAGGER
              value: "true"

            # ── Pipeline tuning (optional, these are defaults) ──
            - name: FP_PUBSUB_CHANNEL_CAPACITY
              value: "500000"
            - name: FP_FLUSH_INTERVAL_SECS
              value: "1"
            - name: FP_DRAIN_INTERVAL_SECS
              value: "30"
            - name: FP_DRAIN_MAX_MESSAGES
              value: "500"
            - name: FP_TASK_BATCH_SIZE
              value: "200"
            - name: FP_WORKER_BATCH_SIZE
              value: "50"
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/v1/readyz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: feloxi-api
  namespace: core
spec:
  selector:
    app: feloxi-api
  ports:
    - port: 80
      targetPort: 8080
