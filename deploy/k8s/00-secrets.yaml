apiVersion: v1
kind: Secret
metadata:
  name: feloxi-secrets
  namespace: core
type: Opaque
stringData:
  # ── PostgreSQL ──
  postgres-user: "fp"
  postgres-password: "CHANGE_ME"           # Change before deploying
  postgres-db: "feloxi"

  # ── ClickHouse ──
  clickhouse-user: "default"
  clickhouse-password: "CHANGE_ME"         # Change before deploying

  # ── JWT ──
  jwt-secret: "CHANGE_ME_MIN_32_CHARS_LONG" # Must be >= 32 characters
