apiVersion: v1
kind: Secret
metadata:
  name: feloxi-secrets
  namespace: core
type: Opaque
stringData:
  # ── PostgreSQL ──
  postgres-user: "fp"
  postgres-password: "CHANGE_ME"           # Change before deploying
  postgres-db: "feloxi"

  # ── ClickHouse ──
  clickhouse-user: "default"
  clickhouse-password: "CHANGE_ME"         # Change before deploying

  # ── JWT ──
  jwt-secret: "CHANGE_ME_MIN_32_CHARS_LONG" # Must be >= 32 characters

  # ── Secrets at rest ──
  # REQUIRED. Base64-encoded 32 bytes: openssl rand -base64 32
  # The API will NOT start until this is a valid base64 32-byte key (the
  # placeholder below is intentionally invalid so an unconfigured deploy fails
  # fast rather than booting with a predictable key).
  # Encrypts integration tokens + SMTP password. Losing it = secrets unrecoverable.
  encryption-key: "CHANGE_ME_RUN_openssl_rand_base64_32"
