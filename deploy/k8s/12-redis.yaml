apiVersion: apps/v1
kind: Deployment
metadata:
  name: feloxi-redis
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feloxi-redis
  template:
    metadata:
      labels:
        app: feloxi-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - "--appendonly"
            - "yes"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: feloxi-redis
  namespace: core
spec:
  selector:
    app: feloxi-redis
  ports:
    - port: 6379
      targetPort: 6379
