apiVersion: apps/v1
kind: Deployment
metadata:
  name: feloxi-web
  namespace: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feloxi-web
  template:
    metadata:
      labels:
        app: feloxi-web
    spec:
      containers:
        - name: feloxi-web
          image: ghcr.io/thesaadmirza/feloxi/web:v0.3.1   # Update tag on deploy
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_URL
              value: "http://feloxi-api:80"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
# NodePort service — required for GCE Ingress backend
apiVersion: v1
kind: Service
metadata:
  name: feloxi-web
  namespace: core
spec:
  type: NodePort
  selector:
    app: feloxi-web
  ports:
    - port: 80
      targetPort: 3000
