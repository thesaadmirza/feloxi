apiVersion: v2
name: feloxi
version: 0.1.0
appVersion: "0.3.1"
description: >-
  Open-source Celery task queue monitoring platform. Real-time task and worker
  visibility via a Rust API, Next.js dashboard, PostgreSQL, ClickHouse, and Redis.
type: application
home: https://github.com/thesaadmirza/feloxi
sources:
  - https://github.com/thesaadmirza/feloxi
maintainers:
  - name: Saad Mirza
    email: thesaadmirza@gmail.com
keywords:
  - celery
  - monitoring
  - task-queue
  - flower-alternative
  - rust
  - nextjs
  - redis
  - clickhouse
  - postgresql
  - real-time
  - workers
  - broker
icon: https://raw.githubusercontent.com/thesaadmirza/feloxi/main/.github/logo.svg
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: added
      description: Beat scheduler page with last run, next run, and missed-beat tracking
    - kind: added
      description: Failure groups view on tasks page — exceptions bucketed by type with traceback expand
    - kind: added
      description: Queue purge action with confirmation dialog
    - kind: added
      description: Prometheus scrape endpoint at GET /metrics
    - kind: added
      description: 30-day time range preset on dashboard
    - kind: added
      description: KPI cards navigate to filtered tasks on click
    - kind: added
      description: Broker selector, depth sparklines, and purge button on queues page
    - kind: added
      description: Worker hostname search, sort controls, and expand-all toggle
    - kind: added
      description: System health page linked in sidebar navigation
    - kind: fixed
      description: All 10 alert condition types now reachable from the create-rule form
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/prerelease: "false"
