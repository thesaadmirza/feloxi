apiVersion: v2
name: feloxi
version: 0.2.0
appVersion: "2.0.0"
description: >-
  Open-source Celery task queue monitoring platform. Real-time task and worker
  visibility via a Rust API, Next.js dashboard, PostgreSQL, ClickHouse, and Redis.
type: application
home: https://github.com/thesaadmirza/feloxi
sources:
  - https://github.com/thesaadmirza/feloxi
maintainers:
  - name: Saad Mirza
    email: thesaadmirza@gmail.com
keywords:
  - celery
  - monitoring
  - task-queue
  - flower-alternative
  - rust
  - nextjs
  - redis
  - clickhouse
  - postgresql
  - real-time
  - workers
  - broker
icon: https://raw.githubusercontent.com/thesaadmirza/feloxi/main/.github/logo.svg
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: Apache-2.0
  artifacthub.io/changes: |
    - kind: changed
      description: "appVersion tracks the app again (2.0.0); default image tags resolve to current images"
    - kind: added
      description: "App supports alert silences, severity routing, resolved notifications, Discord OAuth, and Google SSO (configure DISCORD_*/GOOGLE_* via existing secret wiring)"
  artifacthub.io/containsSecurityUpdates: "false"
  artifacthub.io/prerelease: "false"
