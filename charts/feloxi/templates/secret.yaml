{{- if not .Values.auth.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "feloxi.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "feloxi.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.auth.secretKeys.jwtSecretKey }}: {{ required "auth.jwtSecret is required when auth.existingSecret is not set (must be at least 32 characters)" .Values.auth.jwtSecret | quote }}
  {{ .Values.auth.secretKeys.encryptionKeyKey }}: {{ required "auth.encryptionKey is required when auth.existingSecret is not set (base64-encoded 32 bytes; openssl rand -base64 32)" .Values.auth.encryptionKey | quote }}
  {{- if .Values.integrations.slack.clientId }}
  {{ .Values.auth.secretKeys.slackClientSecretKey }}: {{ required "integrations.slack.clientSecret is required when integrations.slack.clientId is set (or supply it via auth.existingSecret)" .Values.integrations.slack.clientSecret | quote }}
  {{- end }}
  {{- if .Values.integrations.discord.clientId }}
  {{ .Values.auth.secretKeys.discordClientSecretKey }}: {{ required "integrations.discord.clientSecret is required when integrations.discord.clientId is set (or supply it via auth.existingSecret)" .Values.integrations.discord.clientSecret | quote }}
  {{- end }}
  {{- if .Values.sso.google.clientId }}
  {{ .Values.auth.secretKeys.googleClientSecretKey }}: {{ required "sso.google.clientSecret is required when sso.google.clientId is set (or supply it via auth.existingSecret)" .Values.sso.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.smtp.enabled }}
  {{ .Values.smtp.secretKeys.hostKey }}: {{ .Values.smtp.host | quote }}
  {{ .Values.smtp.secretKeys.portKey }}: {{ .Values.smtp.port | quote }}
  {{ .Values.smtp.secretKeys.usernameKey }}: {{ .Values.smtp.username | quote }}
  {{ .Values.smtp.secretKeys.passwordKey }}: {{ .Values.smtp.password | quote }}
  {{ .Values.smtp.secretKeys.fromKey }}: {{ .Values.smtp.from | quote }}
  {{- end }}
  {{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
  {{ .Values.postgresql.auth.secretKeys.usernameKey }}: {{ .Values.postgresql.auth.username | quote }}
  {{ .Values.postgresql.auth.secretKeys.passwordKey }}: {{ required "postgresql.auth.password is required when postgresql.enabled=true and no existingSecret is set" .Values.postgresql.auth.password | quote }}
  {{ .Values.postgresql.auth.secretKeys.databaseKey }}: {{ .Values.postgresql.auth.database | quote }}
  {{- end }}
  {{- if and .Values.clickhouse.enabled (not .Values.clickhouse.auth.existingSecret) }}
  {{ .Values.clickhouse.auth.secretKeys.usernameKey }}: {{ .Values.clickhouse.auth.username | quote }}
  {{ .Values.clickhouse.auth.secretKeys.passwordKey }}: {{ required "clickhouse.auth.password is required when clickhouse.enabled=true and no existingSecret is set" .Values.clickhouse.auth.password | quote }}
  {{- end }}
{{- end }}
