{{- if .Values.clickhouse.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "feloxi.fullname" . }}-clickhouse-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "feloxi.labels" . | nindent 4 }}
    app.kubernetes.io/component: clickhouse
data:
  config.xml: |
    <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <listen_host>::</listen_host>
        <http_port>8123</http_port>
        <tcp_port>9000</tcp_port>
        <max_connections>100</max_connections>
        <max_concurrent_queries>50</max_concurrent_queries>

        <!-- Disk-full guard: reject INSERTs cleanly while configurable headroom
             remains so the disk never hits 100% (a full CH can't run the
             merges/mutations needed to recover). Buffered events replay from
             Redis once space is freed. -->
        <merge_tree>
            <min_free_disk_ratio_to_perform_insert>{{ .Values.clickhouse.minFreeDiskRatioToInsert | default 0.05 }}</min_free_disk_ratio_to_perform_insert>
        </merge_tree>

        <!-- Cap system log tables to prevent disk fill -->
        <text_log>
            <database>system</database>
            <table>text_log</table>
            <flush_interval_milliseconds>30000</flush_interval_milliseconds>
            <ttl>event_date + INTERVAL {{ .Values.clickhouse.systemLogTtlDays }} DAY</ttl>
        </text_log>
        <trace_log>
            <database>system</database>
            <table>trace_log</table>
            <flush_interval_milliseconds>30000</flush_interval_milliseconds>
            <ttl>event_date + INTERVAL {{ .Values.clickhouse.systemLogTtlDays }} DAY</ttl>
        </trace_log>
        <query_log>
            <database>system</database>
            <table>query_log</table>
            <flush_interval_milliseconds>30000</flush_interval_milliseconds>
            <ttl>event_date + INTERVAL {{ .Values.clickhouse.systemLogTtlDays }} DAY</ttl>
        </query_log>
        <metric_log>
            <database>system</database>
            <table>metric_log</table>
            <flush_interval_milliseconds>30000</flush_interval_milliseconds>
            <ttl>event_date + INTERVAL {{ .Values.clickhouse.systemLogTtlDays }} DAY</ttl>
        </metric_log>
        <asynchronous_metric_log>
            <database>system</database>
            <table>asynchronous_metric_log</table>
            <flush_interval_milliseconds>60000</flush_interval_milliseconds>
            <ttl>event_date + INTERVAL {{ .Values.clickhouse.systemLogTtlDays }} DAY</ttl>
        </asynchronous_metric_log>
        <part_log>
            <database>system</database>
            <table>part_log</table>
            <flush_interval_milliseconds>30000</flush_interval_milliseconds>
            <ttl>event_date + INTERVAL {{ .Values.clickhouse.systemLogTtlDays }} DAY</ttl>
        </part_log>
        <users>
            <default>
                <password></password>
                <networks>
                    <ip>::/0</ip>
                </networks>
                <profile>default</profile>
                <quota>default</quota>
                <access_management>1</access_management>
            </default>
        </users>
    </clickhouse>
{{- end }}
